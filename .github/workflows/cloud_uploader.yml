name: Cloud Uploader (Drive)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "Direct ZIP URL"
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:

    # 1) Cache apt packages
    - name: Cache apt packages
      id: cache-apt
      uses: actions/cache@v4
      with:
        path: |
          /var/cache/apt/archives
          /var/lib/apt/lists
        key: apt-${{ runner.os }}-unzip-curl

    # 2) Cache rclone binary
    - name: Cache rclone
      id: cache-rclone
      uses: actions/cache@v4
      with:
        path: /usr/bin/rclone
        key: rclone-${{ runner.os }}-v1.68

    # 3) Install apt tools (skipped if cached)
    - name: Install dependencies
      if: steps.cache-apt.outputs.cache-hit != 'true'
      run: |
        sudo apt update
        sudo apt install -y unzip curl

    # 4) Install rclone (skipped if cached)
    - name: Install rclone
      if: steps.cache-rclone.outputs.cache-hit != 'true'
      run: curl https://rclone.org/install.sh | sudo bash

    # 5) Prepare workspace
    - name: Prepare workspace
      run: mkdir -p work

    # 6) Download ZIP
    - name: Download ZIP
      run: |
        cd work
        echo "Downloading..."
        curl -L -C - "${{ github.event.inputs.zip_url }}" -o archive.zip

    # 7) Extract ZIP
    - name: Extract ZIP
      run: |
        cd work
        mkdir -p extracted
        unzip -o archive.zip -d extracted

    # 8) Configure rclone OAuth
    - name: Configure rclone
      run: |
        mkdir -p ~/.config/rclone
        cat > ~/.config/rclone/rclone.conf <<EOF
        [drive]
        type = drive
        client_id = ${{ secrets.GDRIVE_CLIENT_ID }}
        client_secret = ${{ secrets.GDRIVE_CLIENT_SECRET }}
        scope = drive
        token = {"access_token":"ya29.fake","token_type":"Bearer","refresh_token":"${{ secrets.GDRIVE_REFRESH_TOKEN }}","expiry":"2000-01-01T00:00:00Z"}
        EOF

    # 9) Upload to Google Drive (resumable)
    - name: Upload to Drive (resume safe)
      run: |
        rclone copy work/extracted drive:Telebot \
          --progress \
          --transfers 2 \
          --checkers 4 \
          --drive-chunk-size 64M \
          --retries 999 \
          --low-level-retries 999 \
          --timeout 10m \
          --contimeout 10m \
          --ignore-existing \
          --size-only \
          --inplace \
          --log-file upload.log \
          --log-level INFO
