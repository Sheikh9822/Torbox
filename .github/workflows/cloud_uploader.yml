name: Cloud Uploader (Drive + Telegram)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "Direct ZIP URL"
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:

    # 1) Cache apt packages
    - name: Cache apt packages
      id: cache-apt
      uses: actions/cache@v4
      with:
        path: |
          /var/cache/apt/archives
          /var/lib/apt/lists
        key: apt-${{ runner.os }}-unzip-curl-jq-ffmpeg
        restore-keys: |
          apt-${{ runner.os }}-

    # 2) Cache rclone binary
    - name: Cache rclone
      id: cache-rclone
      uses: actions/cache@v4
      with:
        path: /usr/bin/rclone
        key: rclone-${{ runner.os }}-v1.68

    # 3) Install tools (skipped if fully cached)
    - name: Install dependencies
      if: steps.cache-apt.outputs.cache-hit != 'true'
      run: |
        sudo apt update
        sudo apt install -y unzip curl jq ffmpeg

    - name: Install rclone
      if: steps.cache-rclone.outputs.cache-hit != 'true'
      run: curl https://rclone.org/install.sh | sudo bash

    # 4) Workspace
    - name: Prepare workspace
      run: mkdir -p work

    # 5) Download ZIP (resumable) — cache keyed on URL
    - name: Cache downloaded ZIP
      id: cache-zip
      uses: actions/cache@v4
      with:
        path: work/archive.zip
        key: zip-${{ hashFiles('') }}-${{ github.event.inputs.zip_url }}

    - name: Download ZIP
      if: steps.cache-zip.outputs.cache-hit != 'true'
      run: |
        cd work
        echo "Downloading..."
        curl -L -C - "${{ github.event.inputs.zip_url }}" -o archive.zip

    # 6) Extract (cache keyed on ZIP)
    - name: Cache extracted files
      id: cache-extracted
      uses: actions/cache@v4
      with:
        path: work/extracted
        key: extracted-${{ github.event.inputs.zip_url }}

    - name: Extract ZIP
      if: steps.cache-extracted.outputs.cache-hit != 'true'
      run: |
        cd work
        mkdir -p extracted
        unzip -o archive.zip -d extracted

    # 7) Configure rclone OAuth
    - name: Configure rclone
      run: |
        mkdir -p ~/.config/rclone
        cat > ~/.config/rclone/rclone.conf <<EOF
        [drive]
        type = drive
        client_id = ${{ secrets.GDRIVE_CLIENT_ID }}
        client_secret = ${{ secrets.GDRIVE_CLIENT_SECRET }}
        scope = drive
        token = {"access_token":"ya29.fake","token_type":"Bearer","refresh_token":"${{ secrets.GDRIVE_REFRESH_TOKEN }}","expiry":"2000-01-01T00:00:00Z"}
        EOF

    # 8) Upload to Google Drive (resumable)
    - name: Upload to Drive (resume safe)
      run: |
        rclone copy work/extracted drive:Telebot \
          --progress \
          --transfers 2 \
          --checkers 4 \
          --drive-chunk-size 64M \
          --retries 999 \
          --low-level-retries 999 \
          --timeout 10m \
          --contimeout 10m \
          --ignore-existing \
          --size-only \
          --inplace \
          --log-file upload.log \
          --log-level INFO

    # 9) Cache split/tg_ready files
    - name: Cache Telegram-ready files
      id: cache-tg
      uses: actions/cache@v4
      with:
        path: work/extracted/tg_ready
        key: tg-ready-${{ github.event.inputs.zip_url }}

    # 10) Prepare Telegram files (split >1.9GB)
    - name: Split files for Telegram
      if: steps.cache-tg.outputs.cache-hit != 'true'
      run: |
        cd work/extracted
        mkdir -p tg_ready

        find . -type f ! -path "./tg_ready/*" | while read file; do
          size=$(stat -c%s "$file")
          if [ "$size" -gt 1900000000 ]; then
            echo "Splitting large file: $file"
            split -b 1900M "$file" "tg_ready/$(basename "$file").part_"
          else
            cp "$file" tg_ready/
          fi
        done

    # 11) Cache sent.txt for upload resumability
    - name: Cache Telegram sent list
      uses: actions/cache@v4
      with:
        path: work/extracted/tg_ready/sent.txt
        key: tg-sent-${{ github.event.inputs.zip_url }}-${{ github.run_id }}
        restore-keys: |
          tg-sent-${{ github.event.inputs.zip_url }}-

    # 12) Upload to Telegram (SAFE — no secrets in logs)
    - name: Upload to Telegram
      env:
        BOT: ${{ secrets.BOT_TOKEN }}
        CHAT: ${{ secrets.CHAT_ID }}
      run: |
        cd work/extracted/tg_ready

        touch sent.txt

        TOTAL=$(find . -type f ! -name sent.txt | wc -l)
        SENT=$(grep -c "" sent.txt || true)

        MSG_ID=$(curl -s \
          -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
          -d chat_id=$CHAT \
          -d text="Starting upload: $SENT / $TOTAL" \
          | jq -r '.result.message_id')

        COUNT=$SENT

        find . -type f ! -name sent.txt | sort | while read file; do
          if grep -Fxq "$file" sent.txt; then
            continue
          fi

          echo "Uploading file $((COUNT+1)) / $TOTAL"

          curl -s -o /dev/null \
               -F chat_id=$CHAT \
               -F document=@"$file" \
               "https://api.telegram.org/bot$BOT/sendDocument"

          echo "$file" >> sent.txt
          COUNT=$((COUNT+1))
          PERCENT=$((COUNT*100/TOTAL))

          curl -s -o /dev/null \
            -X POST "https://api.telegram.org/bot$BOT/editMessageText" \
            -d chat_id=$CHAT \
            -d message_id=$MSG_ID \
            -d text="Uploading: $COUNT / $TOTAL ($PERCENT%)"

          sleep 6
        done

        curl -s -o /dev/null \
          -X POST "https://api.telegram.org/bot$BOT/editMessageText" \
          -d chat_id=$CHAT \
          -d message_id=$MSG_ID \
          -d text="Upload complete: $TOTAL / $TOTAL"
